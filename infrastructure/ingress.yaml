apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: educonnect-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.allow-http: "true"
    ingress.gcp.kubernetes.io/backend-health-check-path: /health 
spec:
  rules:
    - http:
        paths:
          # Backend (API) path
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          # Frontend path
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
